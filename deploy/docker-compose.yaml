# 使用 Drone CI/CD 构建的镜像启动 OpenBot Gateway
# 镜像来源：.drone.yml 推送到 ccr.ccs.tencentyun.com/windwithlife/openbot
# 可用标签：latest、具体版本或 build-ci-openbot-${DRONE_BUILD_NUMBER}

services:
  openbot:
    image: ccr.ccs.tencentyun.com/windwithlife/openbot:latest
    container_name: openbot
    ports:
      - "38080:38080"
    environment:
      - NODE_ENV=production
    restart: unless-stopped
    # 与 Dockerfile 一致：node dist/cli/cli.js gateway --port 38080
    command: ["gateway", "--port", "38080"]
